<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feats Logic Controller</title>
</head>
<body>

    <div id="ui-header">
        <h1>Character Feats Configuration</h1>
        <div id="slots-remaining" style="font-weight:bold; font-size: 1.2rem; color: #f57c00;">
            Slots Remaining: --
        </div>
    </div>

    <div id="featsData"></div>

    <script type="module">
        import { feat_limits, featsData } from './featslist.js';

        // 1. DATA RETRIEVAL
        // Pulling the character object and the specific race/class strings
        const myCharacter = JSON.parse(localStorage.getItem('myCharacter')) || {};
        const activeRace = localStorage.getItem('race') || "";
        const activeClass = localStorage.getItem('class') || "";

        // 2. POOL CALCULATION (+1 Human, +1 Warrior/Rogue)
        function calculatePool() {
            let pool = 0;
            if (activeRace.toLowerCase() === "human") pool += 1;

            const normalizedClass = activeClass.toLowerCase();
            if (normalizedClass === "warrior" || normalizedClass === "rogue") {
                pool += 1;
            }
            return pool;
        }

        // 3. REQUIREMENT CHECK
        function validateFeat(feat) {
            const r = feat.reqs;
            const s = myCharacter.baseStats || {};

            const levelOk = (myCharacter.level || 1) >= r.level;
            
            // Case-insensitive class check against the requirements array
            const classOk = r.classes.includes("Any") || 
                            r.classes.some(c => c.toLowerCase() === activeClass.toLowerCase());
            
            const arcOk = r.arc.includes("Any") || 
                           r.arc.includes(myCharacter.spec);

            const statKeys = ['sur', 'dex', 'str', 'pie', 'int', 'pre'];
            let statsOk = true;
            statKeys.forEach(key => {
                if (r[key] && (s[key] || 0) < r[key]) statsOk = false;
            });

            return levelOk && classOk && arcOk && statsOk;
        }

        // 4. INTERACTION LOGIC
        function toggleFeat(featId) {
            const pool = calculatePool();
            if (!myCharacter.selectedFeats) myCharacter.selectedFeats = [];
            
            const index = myCharacter.selectedFeats.indexOf(featId);
            
            if (index > -1) {
                myCharacter.selectedFeats.splice(index, 1);
            } else {
                if (myCharacter.selectedFeats.length < pool) {
                    myCharacter.selectedFeats.push(featId);
                } else {
                    alert("No slots remaining!");
                    return;
                }
            }

            // Save the updated character back to localStorage
            localStorage.setItem('myCharacter', JSON.stringify(myCharacter));
            renderUI();
        }

        // 5. RENDER UI
        // Targeting the ID: featsData
        const container = document.getElementById('featsData');
        
        function renderUI() {
            const totalAllowed = calculatePool();
            const currentSelected = (myCharacter.selectedFeats || []).length;
            document.getElementById('slots-remaining').textContent = `Slots Remaining: ${totalAllowed - currentSelected}`;

            container.innerHTML = '';
            
            // Loop through the data imported from featslist.js
            featsData.forEach(feat => {
                const isAvailable = validateFeat(feat);
                const isSelected = (myCharacter.selectedFeats || []).includes(feat.id);
                
                const el = document.createElement('div');
                el.style.padding = "12px";
                el.style.borderBottom = "1px solid #444";
                el.style.cursor = isAvailable ? "pointer" : "not-allowed";
                el.style.opacity = isAvailable ? "1" : "0.5";
                
                if (isSelected) el.style.backgroundColor = "rgba(76, 175, 80, 0.15)";

                const limitTag = Array.isArray(feat.limit) 
                    ? feat.limit.map(k => feat_limits[k]).join(', ') 
                    : feat_limits[feat.limit];

                el.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <div style="width:18px; height:18px; border:1px solid #777; margin-right:15px; background:${isSelected ? '#4caf50' : 'transparent'}"></div>
                        <div>
                            <strong style="color:${isSelected ? '#4caf50' : '#fff'}">${feat.name}</strong> 
                            <span style="font-size:0.8rem; color:#f57c00; margin-left:10px;">${limitTag}</span><br>
                            <small style="color:#aaa">${feat.desc}</small>
                            ${!isAvailable ? '<br><span style="color:#ff5252; font-size:0.75rem; font-weight:bold;">LOCKED</span>' : ''}
                        </div>
                    </div>
                `;

                if (isAvailable) {
                    el.onclick = () => toggleFeat(feat.id);
                }
                
                container.appendChild(el);
            });
        }

        // Initialize the page
        renderUI();
    </script>
</body>
</html>
