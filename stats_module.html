<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RPG One - Character Stats</title>
    <style>
        :root {
            --brand-color: #FFC666;
            --secondary-color: #00F2FF;
            --bg-dark: #121212;
            --panel-bg: rgba(25, 25, 25, 0.95);
        }

        body {
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-box {
            width: 750px;
            background: var(--panel-bg);
            border: 2px solid var(--brand-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        /* Top Header Layout */
        .top-nav {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .nav-item label {
            display: block;
            font-size: 0.7rem;
            color: var(--brand-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item span {
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .size-sub {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 2px;
        }

        /* Grid Layout for Stats */
        .stat-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            margin-bottom: 12px;
            padding: 10px 15px;
            border: 1px solid #333;
            border-radius: 6px;
            position: relative;
        }

        .primary-stat { border: 2px solid var(--brand-color); }
        .secondary-stat { border: 2px solid var(--secondary-color); }

        .stat-label-group label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }

        .stat-val-text { font-size: 1.4rem; font-weight: bold; }

        .race-mod-text {
            font-size: 0.8rem;
            margin-left: 8px;
            font-weight: bold;
        }
        .pos { color: #00ff88; }
        .neg { color: #ff4444; }

        .btn-group button {
            background: transparent;
            color: var(--brand-color);
            border: 1px solid var(--brand-color);
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-group button:hover { background: var(--brand-color); color: #000; }

        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        #points-display { font-size: 2rem; color: var(--brand-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="main-box">
    <div class="top-nav">
        <div class="nav-item">
            <label>Name</label>
            <span id="display-name">---</span>
        </div>
        <div class="nav-item">
            <label>Class</label>
            <span id="display-class">---</span>
            <div class="size-sub">Size: <span id="display-size">---</span></div>
        </div>
        <div class="nav-item">
            <label>Race</label>
            <span id="display-race">---</span>
        </div>
    </div>

    <div class="stat-columns">
        <div class="left-col">
            <div class="stat-row" id="ctrl-str">
                <div class="stat-label-group">
                    <label>Strength</label>
                    <span class="stat-val-text" id="val-str">10</span>
                    <span id="mod-str" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('str', -1)">-</button>
                    <button onclick="changeStat('str', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-sur">
                <div class="stat-label-group">
                    <label>Survivability</label>
                    <span class="stat-val-text" id="val-sur">10</span>
                    <span id="mod-sur" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('sur', -1)">-</button>
                    <button onclick="changeStat('sur', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-int">
                <div class="stat-label-group">
                    <label>Intuition</label>
                    <span class="stat-val-text" id="val-int">10</span>
                    <span id="mod-int" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('int', -1)">-</button>
                    <button onclick="changeStat('int', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="stat-row" id="ctrl-dex">
                <div class="stat-label-group">
                    <label>Dexterity</label>
                    <span class="stat-val-text" id="val-dex">10</span>
                    <span id="mod-dex" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('dex', -1)">-</button>
                    <button onclick="changeStat('dex', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-slot4">
                <div class="stat-label-group">
                    <label id="label-slot4">Logic</label>
                    <span class="stat-val-text" id="val-slot4">10</span>
                    <span id="mod-slot4" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('slot4', -1)">-</button>
                    <button onclick="changeStat('slot4', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-pre">
                <div class="stat-label-group">
                    <label>Presence</label>
                    <span class="stat-val-text" id="val-pre">10</span>
                    <span id="mod-pre" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('pre', -1)">-</button>
                    <button onclick="changeStat('pre', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div>POINTS REMAINING</div>
        <div id="points-display">0</div>
        <button style="margin-top:20px;" class="btn-group" onclick="alert('Saving...')">FINALIZE OPERATIVE</button>
    </div>
</div>

<script>
const RACE_MODS = {
    "human": { str: 0, dex: 0, sur: 0, slot4: 0, int: 0, pre: 0 },
    "elf": { str: -2, dex: 2, sur: -1, slot4: 0, int: 1, pre: 0 },
    "dwarf": { str: 2, dex: -2, sur: 2, slot4: 0, int: 0, pre: -1 },
    "gnome": { str: -3, dex: 1, sur: 0, slot4: 0, int: 2, pre: 0 },
    "halfling": { str: -2, dex: 3, sur: 0, slot4: 0, int: -1, pre: 1 }
};

let baseStats = { str: 10, dex: 10, sur: 10, slot4: 10, int: 10, pre: 10 };
let points = 0;
let primary = "";
let secondary = "";

function init() {
    const race = localStorage.getItem('race') || "human";
    const className = localStorage.getItem('class') || "Warrior";
    const spec = localStorage.getItem('specialization');

    points = (race === "human") ? 85 : 80;

    // Set Labels and Archetypes
    if (className === "Warrior") {
        primary = "sur"; secondary = spec; // str or dex
        document.getElementById('label-slot4').innerText = "LOGIC";
    } else if (className === "Mage") {
        primary = "slot4"; secondary = (spec === "logic") ? "dex" : "sur";
        document.getElementById('label-slot4').innerText = spec.toUpperCase();
    } else if (className === "Paladin") {
        primary = "slot4"; secondary = "str";
        document.getElementById('label-slot4').innerText = "PIETY";
    } else if (className === "Cleric") {
        primary = "slot4"; secondary = "pre";
        document.getElementById('label-slot4').innerText = "PIETY";
    }

    // Visual Borders
    document.getElementById(`ctrl-${primary}`).classList.add('primary-stat');
    document.getElementById(`ctrl-${secondary}`).classList.add('secondary-stat');

    // UI Headers
    document.getElementById('display-name').innerText = localStorage.getItem('charName') || "UNKNOWN";
    document.getElementById('display-class').innerText = className;
    document.getElementById('display-race').innerText = race;
    document.getElementById('display-size').innerText = localStorage.getItem('size') || "Medium";

    update();
}

function changeStat(s, d) {
    const race = localStorage.getItem('race') || "human";
    const cap = (race === "human" && s === primary) ? 22 : 18;
    if (d > 0 && points > 0 && baseStats[s] < cap) { baseStats[s]++; points--; }
    else if (d < 0 && baseStats[s] > 10) { baseStats[s]--; points++; }
    update();
}

function update() {
    const race = localStorage.getItem('race') || "human";
    const mods = RACE_MODS[race];

    for (let s in baseStats) {
        const final = baseStats[s] + mods[s];
        document.getElementById(`val-${s}`).innerText = final;
        const modEl = document.getElementById(`mod-${s}`);
        const m = mods[s];
        modEl.innerText = m > 0 ? `(+${m})` : (m < 0 ? `(${m})` : "");
        modEl.className = "race-mod-text " + (m > 0 ? "pos" : "neg");
    }
    document.getElementById('points-display').innerText = points;
}

window.onload = init;
</script>

</body>
</html>
