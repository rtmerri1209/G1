<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <title>RPG One - Character Stats</title>
   
	<script src="classrules.js"
    defer></script>

    <style>
        :root {
            --brand-color: #FFC666;
            --secondary-color: #00F2FF;
            --bg-dark: #121212;
            --panel-bg: rgba(25, 25, 25, 0.95);
        }

        body {
            background-image: url('Dope.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-box {
            width: 800px;
            background: var(--panel-bg);
            border: 2px solid var(--brand-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }
/* 1. Make the stat box a "parent" so the letters stay inside it */ 
.stat-item{   
[id^="ctrl-"] {
    position: relative; 
}
}
/* 2. Create the 'P' for Primary Stats */
.primary-stat::after {
    content: 'Primary';
    position: absolute;
    right: 50%; /* This puts it in the middle gap */
    top: 50%;
    transform: translate(50%, -50%);
    color: var(--brand-color); /* Uses your orange-ish brand color */
    font-weight: bold;
    font-size: 1.2rem;
    opacity: 0.5; /* Makes it slightly see-through so it looks like a HUD */
    pointer-events: none;
}

/* 3. Create the 'S' for Secondary Stats */
.secondary-stat::after {
    content: 'Secondary';
    position: absolute;
    right: 50%;
    top: 50%;
    transform: translate(50%, -50%);
    color: var(--secondary-color); /* Uses your blue secondary color */
    font-weight: bold;
    font-size: 1.2rem;
    opacity: 0.5;
    pointer-events: none;
}

        /* Top Header Layout */
        .top-nav {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .nav-item label { display: block; font-size: 0.7rem; color: var(--brand-color); text-transform: uppercase; }
        .nav-item span { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; }
        .size-sub { font-size: 0.85rem; color: #888; margin-top: 5px; }

        /* Grid Layout for Stats */
        .stat-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            margin-bottom: 15px;
            padding: 12px 20px;
            border: 1px solid #333;
            border-radius: 8px;
        }

        .primary-stat { border: 2px solid var(--brand-color); box-shadow: inset 0 0 10px rgba(255,198,102,0.2); }
        .secondary-stat { border: 2px solid var(--secondary-color); box-shadow: inset 0 0 10px rgba(0,242,255,0.1); }

        .stat-label-group label { display: block; font-size: 0.7rem; color: #777; text-transform: uppercase; }
        .stat-val-text { font-size: 1.8rem; font-weight: bold; }

        .race-mod-text { font-size: 0.85rem; margin-left: 10px; font-weight: bold; }
        .pos { color: #00ff88; }
        .neg { color: #ff4444; }

        .btn-group button {
            background: transparent;
            color: var(--brand-color);
            border: 1px solid var(--brand-color);
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
        }

        .btn-group button:hover { background: var(--brand-color); color: #000; }

        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #444;
            padding-top: 25px;
        }

        #points-display { font-size: 2.5rem; color: var(--brand-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="main-box">
    <div class="top-nav">
        <div class="nav-item">
            <label>Name</label>
            <span id="display-name">---</span>
        </div>
        <div class="nav-item">
            <label>Class</label>
            <span id="display-class">---</span>
            <div class="size-sub">Size: <span id="display-size">---</span></div>
        </div>
        <div class="nav-item">
            <label>Race</label>
            <span id="display-race">---</span>
        </div>
    </div>

    <div class="stat-columns">
        <div class="left-col">
            <div class="stat-row" id="ctrl-str">
                <div class="stat-label-group">
                    <label>Strength</label>
                    <span class="stat-val-text" id="val-str">10</span>
                    <span id="mod-str" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('str', -1)">-</button>
                    <button onclick="changeStat('str', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-sur">
                <div class="stat-label-group">
                    <label>Survivability</label>
                    <span class="stat-val-text" id="val-sur">10</span>
                    <span id="mod-sur" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('sur', -1)">-</button>
                    <button onclick="changeStat('sur', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-int">
                <div class="stat-label-group">
                    <label>Intuition</label>
                    <span class="stat-val-text" id="val-int">10</span>
                    <span id="mod-int" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('int', -1)">-</button>
                    <button onclick="changeStat('int', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="stat-row" id="ctrl-dex">
                <div class="stat-label-group">
                    <label>Dexterity</label>
                    <span class="stat-val-text" id="val-dex">10</span>
                    <span id="mod-dex" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('dex', -1)">-</button>
                    <button onclick="changeStat('dex', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-slot4">
                <div class="stat-label-group">
                    <label id="label-slot4">Logic</label>
                    <span class="stat-val-text" id="val-slot4">10</span>
                    <span id="mod-slot4" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('slot4', -1)">-</button>
                    <button onclick="changeStat('slot4', 1)">+</button>
                </div>
            </div>
            <div class="stat-row" id="ctrl-pre">
                <div class="stat-label-group">
                    <label>Presence</label>
                    <span class="stat-val-text" id="val-pre">10</span>
                    <span id="mod-pre" class="race-mod-text"></span>
                </div>
                <div class="btn-group">
                    <button onclick="changeStat('pre', -1)">-</button>
                    <button onclick="changeStat('pre', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <label style="color: #777; text-transform: uppercase; font-size: 0.8rem;">Points Remaining</label>
        <div id="points-display">0</div>
	<button class="btn-group'    
		style="margin-top: 25px;
	width: auto; padding: 10px 40px;
	font-size: 1rem;"


	onclick="finalizeAndContinue()">
		Finalize & Continue
		</button>
    </div>
</div>

<script>
    // 1. Move the timer definition to the TOP
    let syncTimer; 

    function syncCharacterDisplay() {
        const n = localStorage.getItem('cname');
        const r = localStorage.getItem('race');
        const c = localStorage.getItem('class');
        const s = localStorage.getItem('specialization');
        const z = localStorage.getItem('size');

        const nameEl = document.getElementById('display-name');

        const raceEl = document.getElementById('display-race');
        const classEl = document.getElementById('display-class');
        const sizeEl = document.getElementById('display-size');

        if (nameEl && n) nameEl.textContent = n;
        if (raceEl && r) raceEl.textContent = r;
        if (sizeEl && z) sizeEl.textContent = z;
        
        if (classEl && c) {
            classEl.textContent = (s ? s + " " : "") + c;
        }

        // 2. Now the function knows what syncTimer is and can clear it
        if (nameEl && nameEl.textContent !== "---") {
            clearInterval(syncTimer);
            console.log("RPG Sync: Success and Timer Cleared.");
        }
    }

    // 3. Start the interval and assign it to the variable we made at the top
    syncTimer = setInterval(syncCharacterDisplay, 100);

function finalizeAndContinue() {
    
    const myCharacter = JSON.parse(localStorage.getItem('myCharacter'))
    // Optional: Prevent proceeding if they still have points left
    if (points > 0) {
        const confirmSpend = confirm(`You still have ${points} points left! Are you sure you want to proceed?`);
        if (!confirmSpend) return;
    }

    // Save the final calculated stats (including race mods) so stats2.html can use them
    const race = localStorage.getItem('race') || "human";
    const mods = RACE_MODS[race];
    
    let finalStats = {};
    for (let s in baseStats) {
		let lookupKey = (s === "slot4" &&
	myCharacter.primaryStat)
		? myCharacter.primaryStat
		: s;
		finalStats[s] = baseStats[s] + (mods[lookupKey] || 0);

    }

    // Store the object as a string in localStorage
    localStorage.setItem('finalCalculatedStats', JSON.stringify(finalStats));

    // Move to the next page
    window.location.href = "feats_data.html";
}


</script>

</body>
</html>
