<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Achilles Mark 1 - Character Stats Module</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .stats-container {
            width: 700px;
            background: #252525;
            padding: 30px;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Header Layout: Name | Class | Race */
        .identity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #555;
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .id-box {
            flex: 1;
            text-align: center;
        }

        .id-box label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .id-box span {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
        }

        /* Size Category - Centered */
        .size-row {
            text-align: center;
            margin-bottom: 30px;
        }

        .size-badge {
            background: #333;
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #00ffcc;
            border: 1px solid #444;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-control {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #3d3d3d;
        }

        .stat-info label {
            display: block;
            font-weight: bold;
            color: #aaa;
        }

        .stat-info .value {
            font-size: 1.8rem;
            color: #fff;
        }

        .controls button {
            background: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 4px;
            margin-left: 5px;
        }

        .controls button:hover {
            background: #666;
        }

        /* Points Remaining */
        .pool-display {
            margin-top: 30px;
            text-align: center;
            font-size: 1.2rem;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 4px;
            border: 1px solid #00ffcc;
        }

        #points-count {
            color: #00ffcc;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .special-note {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="stats-container">
    <div class="identity-header">
        <div class="id-box">
            <label>Name</label>
            <span>Kaelen</span>
        </div>
        <div class="id-box">
            <label>Class</label>
            <span id="class-display">Paladin</span>
        </div>
        <div class="id-box">
            <label>Race</label>
            <span id="race-display">Human</span>
        </div>
    </div>

    <div class="size-row">
        <span class="size-badge">Size: Medium</span>
    </div>

    <div class="stats-grid">
        <div class="stat-control">
            <div class="stat-info">
                <label>Strength</label>
                <span class="value" id="str-val">10</span>
            </div>
            <div class="controls">
                <button onclick="changeStat('str', -1)">-</button>
                <button onclick="changeStat('str', 1)">+</button>
            </div>
        </div>

        <div class="stat-control">
            <div class="stat-info">
                <label>Dexterity</label>
                <span class="value" id="dex-val">10</span>
            </div>
            <div class="controls">
                <button onclick="changeStat('dex', -1)">-</button>
                <button onclick="changeStat('dex', 1)">+</button>
            </div>
        </div>

        <div class="stat-control">
            <div class="stat-info">
                <label>Survivability</label>
                <span class="value" id="sur-val">10</span>
            </div>
            <div class="controls">
                <button onclick="changeStat('sur', -1)">-</button>
                <button onclick="changeStat('sur', 1)">+</button>
            </div>
        </div>

        <div class="stat-control" style="border-color: #00ffcc;">
            <div class="stat-info">
                <label id="slot4-label">Piety</label>
                <span class="value" id="slot4-val">10</span>
            </div>
            <div class="controls">
                <button onclick="changeStat('slot4', -1)">-</button>
                <button onclick="changeStat('slot4', 1)">+</button>
            </div>
        </div>

        <div class="stat-control">
            <div class="stat-info">
                <label>Intuition</label>
                <span class="value" id="int-val">10</span>
            </div>
            <div class="controls">
                <button onclick="changeStat('int', -1)">-</button>
                <button onclick="changeStat('int', 1)">+</button>
            </div>
        </div>

        <div class="stat-control">
            <div class="stat-info">
                <label>Presence</label>
                <span class="value" id="pre-val">10</span>
            </div>
            <div class="controls">
                <button onclick="changeStat('pre', -1)">-</button>
                <button onclick="changeStat('pre', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="pool-display">
        Points Remaining: <span id="points-count">25</span>
        <div class="special-note" id="race-bonus-note">+5 Human Bonus Applied</div>
    </div>
</div>

<script>
    // Initializing based on your logic
    let isHuman = true;
    let pointsRemaining = isHuman ? 85 : 80;
    
    // Starting all stats at 10 (spending 60 points)
    let stats = {
        str: 10, dex: 10, sur: 10, slot4: 10, int: 10, pre: 10
    };

    pointsRemaining -= 60; 

    function updateUI() {
        document.getElementById('str-val').innerText = stats.str;
        document.getElementById('dex-val').innerText = stats.dex;
        document.getElementById('sur-val').innerText = stats.sur;
        document.getElementById('slot4-val').innerText = stats.slot4;
        document.getElementById('int-val').innerText = stats.int;
        document.getElementById('pre-val').innerText = stats.pre;
        document.getElementById('points-count').innerText = pointsRemaining;
    }

    function changeStat(stat, amount) {
        let currentVal = stats[stat];
        let floor = 3;
        let ceiling = 20;

        // Logic for the 22 Racial Ceiling
        // (In a full app, this would check specific race/stat combinations)
        if (isHuman) ceiling = 22; 

        if (amount > 0 && pointsRemaining > 0 && currentVal < ceiling) {
            stats[stat]++;
            pointsRemaining--;
        } else if (amount < 0 && currentVal > floor) {
            stats[stat]--;
            pointsRemaining++;
        }
        
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
