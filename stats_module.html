<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RPG One - Character Stats</title>
    <style>
        :root {
            --brand-color: #FFC666;
            --secondary-color: #00F2FF;
            --bg-dark: #121212;
            --panel-bg: rgba(25, 25, 25, 0.95);
        }

        body {
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-box {
            width: 750px;
            background: var(--panel-bg);
            border: 2px solid var(--brand-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        /* Top Header Layout */
        .top-nav {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .nav-item label {
            display: block;
            font-size: 0.7rem;
            color: var(--brand-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item span {
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .size-sub {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 2px;
        }

        /* Grid Layout for Stats */
        .stat-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            margin-bottom: 12px;
            padding: 10px 15px;
            border: 1px solid #333;
            border-radius: 6px;
            position: relative;
        }

        .primary-stat { border: 2px solid var(--brand-color); }
        .secondary-stat { border: 2px solid var(--secondary-color); }

        .stat-label-group label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }

        .stat-val-text { font-size: 1.4rem; font-weight: bold; }

        .race-mod-text {
            font-size: 0.8rem;
            margin-left: 8px;
            font-weight: bold;
        }
        .pos { color: #00ff88; }
        .neg { color: #ff4444; }

        .btn-group button {
            background: transparent;
            color: var(--brand-color);
            border: 1px solid var(--brand-color);
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-group button:hover { background: var(--brand-color); color: #000; }

        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        #points-display { font-size: 2rem; color: var(--brand-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="main-box">
    <div class="top-nav">
        <div class="nav-item">
            <label>Name</label>
            <span id="display-name">---</span>
        </div>
        <div class="nav-item">
            <label>Class</label>
            <span id="display-class">---</span>
            <div class="size-sub">Size: <span id="display-size">---</span></div>
        </div>
        <div class="nav-item">
            <label>Race</label>
            <span id="display-race">---</span>
        </div>
    </div>

    <div class="stat-columns">
        <div class="left-col">

                <div class="stat-label
