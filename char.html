<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Registration - Project Alpha</title>
    <style>
        body {
            background: #000;
            color: #FFCC66; /* Your Pale Amber */
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .terminal-box {
            border: 1px solid #FFCC66;
            background: rgba(40, 30, 20, 0.4);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        input, select {
            background: #111;
            border: 1px solid #FFCC66;
            color: #FFCC66;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            border-radius: 5px;
        }

        input:disabled {
            color: #888;
            border-color: #444;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFCC66;
            border: 1px solid #FFCC66;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn:hover {
            background: rgba(255, 204, 102, 0.2);
        }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 5px;">New Character</h1>

    <div class="terminal-box">
        <div class="input-group">
            <label>NAME:</label>
            <input type="text" id="char-name" placeholder="Character Name">
        </div>

        <div class="input-group">
            <label>RACE:</label>
            <select id="char-race" onchange="updateSize()">
                <option value="human">Human</option>
                <option value="elf">Elf</option>
                <option value="dwarf">Dwarf</option>
                <option value="gnome">Gnome</option>
                <option value="halfling">Halfling</option>
            </select>
        </div>

        <div class="input-group">
            <label>SIZE CATEGORY:</label>
            <input type="text" id="char-size" value="Medium" disabled>
        </div>

        <button class="btn" onclick="goToStats()">Next</button>
        <button class="btn" style="border-color: #444; color: #888;" onclick="window.location.href='index.html'">Back</button>
    </div>

    <script>
        function updateSize() {
            const race = document.getElementById('char-race').value;
            const size = document.getElementById('char-size');

            if (race === 'gnome' || race === 'halfling') {
                size.value = 'SMALL';
            } else {
                size.value = 'MEDIUM';
            }
        }

        function goToStats() {
            const name = document.getElementById('char-name').value;
            if (!name) {
                alert("Operator must have a name.");
                return;
			}
     		const race = document.getElementById('char-race').value;
		const size = document.getElementById('char-size').value;
    

    // 3. Save to the browser's "Notebook"
    const charData = { name, race, size };
    localStorage.setItem('activeCharacter', JSON.stringify(charData));

    // 4. NOW change the screen
    window.location.href = "stats_module.html"; 
}

    </script>


</body>
</html>
