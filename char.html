<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Achilles Mark 1 - Character Selection</title>
    <style>
        :root {
            --brand-color: #FFC666; 
            --bg-overlay: rgba(26, 26, 26, 0.9);
            --panel-bg: rgba(37, 37, 37, 0.95);
        }

        body { 
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #1a1a1a;
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .selection-container { 
            width: 500px; 
            background: var(--panel-bg); 
            padding: 40px; 
            border: 2px solid var(--brand-color); 
            border-radius: 8px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 { 
            color: var(--brand-color); 
            text-transform: uppercase; 
            letter-spacing: 3px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--brand-color);
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--brand-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--brand-color);
            outline: none;
        }

        .btn-row {
            margin-top: 40px;
        }

        .start-btn {
            background: transparent;
            color: var(--brand-color);
            border: 2px solid var(--brand-color);
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background: var(--brand-color);
            color: #1a1a1a;
            box-shadow: 0 0 20px rgba(255, 198, 102, 0.4);
        }
    </style>
</head>
<body>

<div class="selection-container">
    <h2>Identify Operative</h2>
    
    <div class="input-group">
        <label>Character Name</label>
        <input type="text" id="char-name" placeholder="ENTER NAME...">
    </div>

    <div class="input-group">
        <label>Race</label>
        <select id="race-select">
            <option value="human">Human</option>
            <option value="elf">Elf</option>
            <option value="dwarf">Dwarf</option>
            <option value="gnome">Gnome</option>
            <option value="halfling">Halfling</option>
        </select>
    </div>

    <div class="input-group">
        <label>Primary Class</label>
        <select id="class-select">
            <option value="Paladin">Paladin</option>
            <option value="Cleric">Cleric</option>
            <option value="Mage">Mage</option>
            <option value="Warrior">Warrior</option>
        </select>
    </div>

    <div class="btn-row">
        <button class="start-btn" onclick="initializeCharacter()">Initialize Stats</button>
    </div>
</div>

<script>
    function initializeCharacter() {
        const name = document.getElementById('char-name').value;
        const race = document.getElementById('race-select').value;
        const className = document.getElementById('class-select').value;

        if (!name) {
            alert("Please enter a character name.");
            return;
        }

        // Logic for Size Category based on your constraints
        // Medium for all except gnome and halfling
        let size = "Medium";
        if (race === "gnome" || race === "halfling") {
            size = "Small";
        }

        // Save everything to LocalStorage for the Stats Module to pick up
        localStorage.setItem('charName', name);
        localStorage.setItem('race', race);
        localStorage.setItem('class', className);
        localStorage.setItem('size', size);

        // Redirect to the stats module exactly as requested
        window.location.href = 'stats_module.html';
    }
</script>

</body>
</html>
