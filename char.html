<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="global_style.css">
    <meta charset="UTF-8">
    <title>Character Creation</title>
</head>
<body>

<div class="selection-panel">
    <h2>Character Creation</h2>
    
    <div class="form-group">
        <label>Character Name </label>
        <input type="text" id="char-name" placeholder="Name...">
    </div>
	
	<div class="form-group">
		<label for="level-select">Level</label>
		<select id="level-select">
			<option value="1">1</option>
			<option value="2">2</option>
			<option value="3">3</option>
			<option value="4">4</option>
			<option value="5">5</option>
			<option value="6">6</option>
			<option value="7">7</option>
			<option value="8">8</option>
		</select>
	</div>
	
    <div class="form-group">
        <label>Biological Origin (Race)</label>
        <select id="race-select">
            <option value="human">Human</option>
            <option value="elf">Elf</option>
            <option value="dwarf">Dwarf</option>
            <option value="gnome">Gnome</option>
            <option value="halfling">Halfling</option>
        </select>
    </div>

    <div class="form-group">
        <label>Combat Archetype (Class)</label>
        <select id="class-select" onchange="toggleSpecialization()">
            <option value="Warrior">Warrior</option>
            <option value="Mage">Mage</option>
            <option value="Paladin">Paladin</option>
            <option value="Cleric">Cleric</option>
	    <option value="Rogue">Rogue</option>
	    <option value="Ranger">Ranger</option>
        </select>
    </div>
    <div class="form-group">
        <label id="spec-label">Specialization Options</label>
        <select id="spec-select">
        </select>
    </div>
</div>
    <button class="start-btn" onclick="saveAndStart()">Initialize Stats</button>

<script>
    const specMap = {
        "Warrior": ["berserker", "maa"],
        "Mage": ["spellslinger", "witchdoctor"],
        "Paladin": ["templar", "bastion"],
        "Ranger": ["beastmaster", "hunter"],
        "Rogue": ["assassin", "pickpocket"],
        "Cleric": ["prophet", "zealot"]
    };
	const specNames = {
        "maa": "Master at Arms",
        "berserker": "Berserker",
        "spellslinger": "Spellslinger",
        "witchdoctor": "Witchdoctor",
        "templar": "Templar",
        "bastion": "Bastion",
        "beastmaster": "Beastmaster",
        "hunter": "Hunter",
        "assassin": "Assassin",
        "pickpocket": "Pickpocket",
        "prophet": "Prophet",
        "zealot": "Zealot"
    }

	function toggleSpecialization() {
        const classDrop= document.getElementById('class-select');
        const specDrop= document.getElementById('spec-select');
        const selectedClass = classDrop.value;
        const options = specMap[selectedClass] || [];
            specDrop.innerHTML = "";
            options.forEach(s => {
                const opt = 
                document.createElement('option');
                opt.value = s;
                opt.textContent = specNames[s] || (s.charAt(0).toUpperCase() + s.slice(1));
                specDrop.appendChild(opt);

            });
        }
    function saveAndStart() {
        const cname = document.getElementById('char-name').value;
        const race = document.getElementById('race-select').value;
        const className = document.getElementById('class-select').value;
        const spec = document.getElementById('spec-select').value;
        const lvl = document.getElementById('level-select').value;
        if (!cname) { alert("Identify yourself!"); return; }

        // Size Logic
        let size = (race === "gnome" || race === "halfling") ? "Small" : "Medium";
        
        const myCharacter = {
            name: cname,
            race: race, 
            size: size,
            class: className,
            spec: spec,
            lvl: lvl,
         
    }

    localStorage.setItem('myCharacter', JSON.stringify(myCharacter));
        // Save to LocalStorage
        
        window.location.href = 'stats_module.html';
      
    }  
   
    toggleSpecialization(); 

</script>

</body>
</html>
