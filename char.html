<!DOCTYPE html>
<html lang="en">
<head>
    <script src="classrules.js"
    defer></script>

    <meta charset="UTF-8">
    <title>Character Creation</title>
    <style>
        
        body {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .selection-panel {
            width: 450px;
            background: rgba(30, 30, 30, 0.95);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        h2 { color: var(--brand-color); text-transform: uppercase; letter-spacing: 2px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }

        .form-group { margin-bottom: 20px; }

        label { display: block; font-size: 0.75rem; color: var(--brand-color); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--brand-color); }

        /* The "Grayed Out" State */
        select:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #333;
        }

        .start-btn {
            width: 100%;
            background: transparent;
            color: var(--brand-color);
            border: 2px solid var(--brand-color);
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .start-btn:hover { background: var(--brand-color); color: #000; box-shadow: 0 0 15px var(--brand-color); }
    </style>
</head>
<body>

<div class="selection-panel">
    <h2>Character Creation</h2>
    
    <div class="form-group">
        <label>Character Name </label>
        <input type="text" id="char-name" placeholder="Name...">
    </div>
	
	<div class="form-group">
		<label for="level-select">Level</label>
		<select id="level-select">
			<option value="1">1</option>
			<option value="2">2</option>
			<option value="3">3</option>
			<option value="4">4</option>
			<option value="5">5</option>
			<option value="6">6</option>
			<option value="7">7</option>
			<option value="8">8</option>
		</select>
	</div>
	
    <div class="form-group">
        <label>Biological Origin (Race)</label>
        <select id="race-select">
            <option value="human">Human</option>
            <option value="elf">Elf</option>
            <option value="dwarf">Dwarf</option>
            <option value="gnome">Gnome</option>
            <option value="halfling">Halfling</option>
        </select>
    </div>

    <div class="form-group">
        <label>Combat Archetype (Class)</label>
        <select id="class-select" onchange="toggleSpecialization()">
            <option value="Warrior">Warrior</option>
            <option value="Mage">Mage</option>
            <option value="Paladin">Paladin</option>
            <option value="Cleric">Cleric</option>
	    <option value="Rogue">Rogue</option>
	    <option value="Ranger">Ranger</option>
        </select>
    </div>
    <div class="form-group">
        <label id="spec-label">Specialization Options</label>
        <select id="spec-select">
            <option value="">-- No Selection Required --</option>
        </select>
    </div>
</div>
    <button class="start-btn" onclick="saveAndStart()">Initialize Stats</button>

<script>
  function toggleSpecialization() {
    const classSelect = document.getElementById('class-select');
    const specSelect = document.getElementById('spec-select');
    const selectedClass = classSelect.value;

    // 1. Clear existing options
    specSelect.innerHTML = '';

    // 2. Get rules for the selected class
    const rules = classRules[selectedClass];

    if (rules && rules.options) {
        // 3. Loop through the options in your classRules object
        for (const key in rules.options) {
            const optionData = rules.options[key];
            const newOption = document.createElement('option');
            
            // Set the value (e.g., "str") and the text (e.g., "Berserker")
            newOption.value = key;
            newOption.textContent = optionData.archetypeName;
            
            specSelect.appendChild(newOption);
        }
    } else {
        // Fallback if no options exist for a class
        const defaultOpt = document.createElement('option');
        defaultOpt.value = "";
        defaultOpt.textContent = "-- No Selection Required --";
        specSelect.appendChild(defaultOpt);
    }
}
    function saveAndStart() {
        const name = document.getElementById('char-name').value;
        const race = document.getElementById('race-select').value;
        const className = document.getElementById('class-select').value;
        const spec = document.getElementById('spec-select').value;
        const lvl = document.getElementById('level-select').value;
        if (!name) { alert("Identify yourself!"); return; }

        // Size Logic
        let size = (race === "gnome" || race === "halfling") ? "Small" : "Medium";

        // Save to LocalStorage
        localStorage.setItem('charName', name);
        localStorage.setItem('race', race);
        localStorage.setItem('class', className);
        localStorage.setItem('size', size);
        localStorage.setItem('specialization', spec); 
		localStorage.setItem('lvl', lvl)
        window.location.href = 'stats_module.html';
    }

    window.addEventListener('DOMContentLoaded', () =>
		{
			const classSelect = document.getElementById('classSelect');
			if (classSelect) {
				toggleSpecialization();
							}
		});
	
</script>

</body>
</html>
